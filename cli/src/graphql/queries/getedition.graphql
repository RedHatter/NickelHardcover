fragment Edition on editions {
  id
  pages
  reading_format_id
}

query GetEdition($isbn: [String!]!, $linked_id: Int!, $user_id: Int!) {
  editions(
    where: {
      _or: [
        { asin: { _in: $isbn } }
        { isbn_10: { _in: $isbn } }
        { isbn_13: { _in: $isbn } }
        { id: { _eq: $linked_id } }
        { book_id: { _eq: $linked_id } }
      ]
    }
    limit: 1
  ) {
    book {
      id
      pages
      default_ebook_edition {
        ...Edition
      }
      default_cover_edition {
        ...Edition
      }
      id_edition: editions(
        where: { id: { _eq: $linked_id }, reading_format_id: { _neq: 2 } }
      ) {
        ...Edition
      }
      isbn_edition: editions(
        where: {
          _or: [
            { asin: { _in: $isbn } }
            { isbn_10: { _in: $isbn } }
            { isbn_13: { _in: $isbn } }
          ]
        }
        limit: 1
      ) {
        ...Edition
      }
      ebook_edition: editions(
        where: { reading_format_id: { _eq: 4 } }
        order_by: { users_count: desc }
        limit: 1
      ) {
        ...Edition
      }
      paper_edition: editions(
        where: { reading_format_id: { _eq: 1 } }
        order_by: { users_count: desc }
        limit: 1
      ) {
        ...Edition
      }
      user_books(where: { user_id: { _eq: $user_id } }) {
        id
        status_id
        rating
        review_has_spoilers
        review_raw
        reviewed_at
        sponsored_review
        edition {
          ...Edition
        }
        user_book_reads(
          where: {
            finished_at: { _is_null: true }
            edition: { reading_format_id: { _neq: 2 } }
          }
          order_by: { started_at: desc }
          limit: 1
        ) {
          id
          started_at
          edition {
            ...Edition
          }
        }
      }
    }
  }
}
